device_id = "sensor-01"

process_interval   = 60
network_interval   = 30
connection_interval = 60
listener_interval  = 300
fim_interval       = 300
baseline_interval  = 3600
heartbeat_interval = 60

fim_paths = [
    "/etc/passwd",
    "/etc/shadow",
    "/etc/ssh/sshd_config",
]

