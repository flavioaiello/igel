id: a1b2c3d4-1008-4000-a000-000000000008
name: Igel - Credential File Permission Exposure
description: |
  Fires when /etc/shadow or /etc/passwd permissions are too permissive, or
  password-max-age policy exceeds 90 days.  Overly broad file permissions allow
  unprivileged users (or a compromised process) to read password hashes, while
  weak ageing policies extend the window for credential abuse.
severity: High
requiredDataConnectors:
  - connectorId: CustomLogsAma
    dataTypes:
      - Igel_CL
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
relevantTechniques:
  - T1552
query: |
  Igel_CL
  | where kind == "baseline"
  | where check in ("shadow-perms", "passwd-perms", "password-max-age")
  | where pass == false
  | project TimeGenerated, device, check, detail, severity
  | extend HostName = device
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: HostName
